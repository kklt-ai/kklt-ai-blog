title: "卡卡罗特AI"
description: "AI工具教程、ChatGPT使用技巧、OpenAI Codex实战、Claude、AI编程与自动化工作流。"
locale: zh-CN
lang: zh-CN
timezone: Asia/Shanghai
url: "https://kklt-ai.github.io"
baseurl: "/kklt-ai-blog"
date_format: "%Y-%m-%d"
read_time: true
words_per_minute: 300
skin: "/assets/css/skins/light.css"

author:
  name: "卡卡罗特AI"

remote_theme: "mmistakes/so-simple-theme@3.2.0"
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

permalink: /:title/
feed:
  path: atom.xml
category_archive_path: "/categories/#"
tag_archive_path: "/tags/#"

defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      share: true

exclude:
  - README.md

footer_links:
  - title: Feed
    url: atom.xml
    icon: fas fa-rss-square
